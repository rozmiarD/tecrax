workflow:
  id: tecrax.diagnose_monitoring_host
  intent: diagnose_monitoring_host
  mode: read_only
  risk: low
  description: Aggregate bounded host, NTP, Docker, Zabbix and AdGuard diagnostics.

  steps:
    - {id: read_os_release, type: connector, connector: monitoring_host, action: read_os_release, timeout: 10s, pause_safe: true, metadata: {continue_on_error: true}}
    - {id: read_kernel_identity, type: connector, connector: monitoring_host, action: read_kernel_identity, timeout: 10s, pause_safe: true, metadata: {continue_on_error: true}}
    - {id: read_hostname, type: connector, connector: monitoring_host, action: read_hostname, timeout: 10s, pause_safe: true, metadata: {continue_on_error: true}}
    - {id: read_uptime, type: connector, connector: monitoring_host, action: read_uptime, timeout: 10s, pause_safe: true, metadata: {continue_on_error: true}}
    - {id: read_load_average, type: connector, connector: monitoring_host, action: read_load_average, timeout: 10s, pause_safe: true, metadata: {continue_on_error: true}}
    - {id: read_filesystem_usage, type: connector, connector: monitoring_host, action: read_filesystem_usage, timeout: 10s, pause_safe: true, metadata: {continue_on_error: true}}
    - {id: read_memory_summary, type: connector, connector: monitoring_host, action: read_memory_summary, timeout: 10s, pause_safe: true, metadata: {continue_on_error: true}}
    - {id: read_ntp_sync_state, type: connector, connector: monitoring_host, action: read_ntp_sync_state, timeout: 10s, pause_safe: true, metadata: {continue_on_error: true}}
    - {id: read_ntp_service_state, type: connector, connector: monitoring_host, action: read_ntp_service_state, timeout: 10s, pause_safe: true, metadata: {continue_on_error: true}}
    - {id: read_docker_service_state, type: connector, connector: monitoring_host, action: read_docker_service_state, timeout: 10s, pause_safe: true, metadata: {continue_on_error: true}}
    - {id: read_docker_socket_state, type: connector, connector: monitoring_host, action: read_docker_socket_state, timeout: 10s, pause_safe: true, metadata: {continue_on_error: true}}
    - {id: read_unattended_upgrades_state, type: connector, connector: monitoring_host, action: read_unattended_upgrades_state, timeout: 10s, pause_safe: true, metadata: {continue_on_error: true}}
    - {id: read_available_updates_summary, type: connector, connector: monitoring_host, action: read_available_updates_summary, timeout: 10s, pause_safe: true, metadata: {continue_on_error: true}}
    - {id: read_aslr_state, type: connector, connector: monitoring_host, action: read_aslr_state, timeout: 10s, pause_safe: true, metadata: {continue_on_error: true}}
    - {id: read_dmesg_restrict_state, type: connector, connector: monitoring_host, action: read_dmesg_restrict_state, timeout: 10s, pause_safe: true, metadata: {continue_on_error: true}}
    - {id: read_reboot_required_marker, type: connector, connector: monitoring_host, action: read_reboot_required_marker, timeout: 10s, pause_safe: true, metadata: {continue_on_error: true}}
    - {id: read_ntp_server_variables, type: connector, connector: monitoring_host, action: read_ntp_server_variables, timeout: 10s, pause_safe: true, metadata: {continue_on_error: true}}
    - {id: read_zabbix_api_version, type: connector, connector: zabbix_api, action: read_zabbix_api_version, timeout: 10s, pause_safe: true, metadata: {continue_on_error: true}}
    - {id: read_adguard_dns_resolution, type: connector, connector: adguard_health, action: read_adguard_dns_resolution, timeout: 10s, pause_safe: true, metadata: {continue_on_error: true}}
    - {id: read_adguard_login_status, type: connector, connector: adguard_health, action: read_adguard_login_status, timeout: 10s, pause_safe: true, metadata: {continue_on_error: true}}
    - {id: read_portainer_status, type: connector, connector: portainer_api, action: read_portainer_status, timeout: 10s, pause_safe: true, metadata: {continue_on_error: true}}
    - {id: normalize_inventory, type: internal, action: normalize_basic_host_inventory, pause_safe: true}
    - {id: normalize_ntp_health, type: internal, action: normalize_ntp_health, pause_safe: true}
    - {id: normalize_docker_services_health, type: internal, action: normalize_docker_services_health, pause_safe: true}
    - {id: normalize_zabbix_health, type: internal, action: normalize_zabbix_health, pause_safe: true}
    - {id: normalize_adguard_health, type: internal, action: normalize_adguard_health, pause_safe: true}
    - {id: normalize_portainer_health, type: internal, action: normalize_portainer_health, pause_safe: true}
    - {id: normalize_host_security_posture, type: internal, action: normalize_host_security_posture, pause_safe: true}
    - {id: normalize_ntp_server_observation, type: internal, action: normalize_ntp_server_observation, pause_safe: true}
    - {id: aggregate_diagnosis, type: internal, action: aggregate_monitoring_host_diagnosis, pause_safe: true}
    - {id: build_reaction_observation, type: internal, action: build_monitoring_host_reaction_observation, pause_safe: true}
    - {id: produce_receipt, type: evidence, action: produce_receipt, pause_safe: true}

  retry:
    max_attempts: 0
    blocked_on: [policy_denied]
