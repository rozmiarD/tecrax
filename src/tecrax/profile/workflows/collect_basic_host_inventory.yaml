workflow:
  id: tecrax.collect_basic_host_inventory
  intent: collect_basic_host_inventory
  mode: read_only
  risk: low
  description: Collect bounded, read-only inventory from one Ubuntu host.

  steps:
    - id: read_os_release
      type: connector
      connector: monitoring_host
      action: read_os_release
      timeout: 10s
      pause_safe: true
    - id: read_kernel_identity
      type: connector
      connector: monitoring_host
      action: read_kernel_identity
      timeout: 10s
      pause_safe: true
    - id: read_hostname
      type: connector
      connector: monitoring_host
      action: read_hostname
      timeout: 10s
      pause_safe: true
    - id: read_uptime
      type: connector
      connector: monitoring_host
      action: read_uptime
      timeout: 10s
      pause_safe: true
    - id: read_load_average
      type: connector
      connector: monitoring_host
      action: read_load_average
      timeout: 10s
      pause_safe: true
    - id: read_filesystem_usage
      type: connector
      connector: monitoring_host
      action: read_filesystem_usage
      timeout: 10s
      pause_safe: true
    - id: read_memory_summary
      type: connector
      connector: monitoring_host
      action: read_memory_summary
      timeout: 10s
      pause_safe: true
    - id: normalize_inventory
      type: internal
      action: normalize_basic_host_inventory
      pause_safe: true
    - id: produce_receipt
      type: evidence
      action: produce_receipt
      pause_safe: true

  retry:
    max_attempts: 1
    allowed_on:
      - timeout
      - transient_connector_error
    blocked_on:
      - policy_denied
