connector:
  name: chrony_ntp_server
  backend: tecrax_chrony_ntp
  capabilities:
    - read_chrony_ntp_server_state
    - apply_chrony_ntp_server
    - rollback_chrony_ntp_server
  required_capability_descriptors:
    - connector.plugin.tecrax_chrony_ntp
  modes:
    - read_only
    - dry_run
    - apply
    - recovery
  timeout_default: 30s
  contract:
    managed_file: /etc/chrony/conf.d/tecrax-ntp-server.conf
    allowed_subnet: strict_ipv4_cidr_min_prefix_24
    live_execution: operator_wrapper_only
    non_claims:
      - firewall_policy
      - client_configuration
      - upstream_server_identity
      - external_reachability
