connector:
  name: monitoring_host
  backend: ssh_readonly
  capabilities:
    - read_os_release
    - read_kernel_identity
    - read_hostname
    - read_uptime
    - read_load_average
    - read_filesystem_usage
    - read_memory_summary
    - read_ntp_sync_state
    - read_ntp_service_state
    - read_docker_service_state
    - read_docker_socket_state
    - read_unattended_upgrades_state
    - read_available_updates_summary
    - read_aslr_state
    - read_dmesg_restrict_state
    - read_reboot_required_marker
    - read_ntp_server_variables
  modes:
    - read_only
    - dry_run
  timeout_default: 10s
  command_shapes:
    read_os_release:
      command: cat
      args: ["/etc/os-release"]
    read_kernel_identity:
      command: uname
      args: ["-srm"]
    read_hostname:
      command: hostname
      args: []
    read_uptime:
      command: uptime
      args: []
    read_load_average:
      command: cat
      args: ["/proc/loadavg"]
    read_filesystem_usage:
      command: df
      args: ["-P", "/"]
    read_memory_summary:
      command: free
      args: ["-m"]
    read_ntp_sync_state:
      command: timedatectl
      args: ["show", "--property=NTPSynchronized", "--property=NTP"]
    read_ntp_service_state:
      command: systemctl
      args: ["is-active", "ntp"]
    read_docker_service_state:
      command: systemctl
      args: ["show", "docker", "--property=LoadState", "--property=ActiveState", "--property=SubState", "--property=UnitFileState", "--no-pager"]
    read_docker_socket_state:
      command: systemctl
      args: ["show", "docker.socket", "--property=LoadState", "--property=ActiveState", "--property=SubState", "--property=UnitFileState", "--no-pager"]
    read_unattended_upgrades_state:
      command: systemctl
      args: ["is-enabled", "unattended-upgrades"]
    read_available_updates_summary:
      command: /usr/lib/update-notifier/apt-check
      args: []
    read_aslr_state:
      command: sysctl
      args: ["-n", "kernel.randomize_va_space"]
    read_dmesg_restrict_state:
      command: sysctl
      args: ["-n", "kernel.dmesg_restrict"]
    read_reboot_required_marker:
      command: find
      args: ["/var/run", "-maxdepth", "1", "-name", "reboot-required", "-printf", "%f\\n"]
    read_ntp_server_variables:
      command: ntpq
      args: ["-c", "rv 0 stratum,offset,rootdelay,rootdisp,leap"]
