connector:
  name: portainer_api
  backend: http_api
  capabilities:
    - read_portainer_status
  required_capability_descriptors:
    - connector.http.rest.read
  network_policy_binding:
    allowed_network_egress:
      - outbound_http
    allowed_network_schemes:
      - https
    allowed_address_classes:
      - dns_name
      - private
  action_shapes:
    read_portainer_status:
      method: GET
      path: /api/status
      unwrap: Version
      mutating: false
      max_response_bytes: 1024
  modes:
    - read_only
    - dry_run
  timeout_default: 10s
