connector:
  name: network_device_cli
  backend: local_shell_readonly
  capabilities:
    - read_network_device_system_info
    - read_network_device_ssh_status
  required_capability_descriptors:
    - connector.shell.readonly
  modes:
    - read_only
    - dry_run
  timeout_default: 15s
  command_shapes:
    read_network_device_system_info:
      command: tecrax-network-cli-readonly
      args: ["system-info"]
    read_network_device_ssh_status:
      command: tecrax-network-cli-readonly
      args: ["ssh-status"]
