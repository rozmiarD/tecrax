connector:
  name: zabbix_api
  backend: http_api
  capabilities:
    - read_zabbix_api_version
  required_capability_descriptors:
    - connector.http.rest.read
  network_policy_binding:
    allowed_network_egress:
      - outbound_http
    allowed_network_schemes:
      - http
      - https
    allowed_address_classes:
      - dns_name
      - private
  action_shapes:
    read_zabbix_api_version:
      method: POST
      path: /api_jsonrpc.php
      body:
        jsonrpc: "2.0"
        method: apiinfo.version
        params: {}
        id: 1
      mutating: false
      max_response_bytes: 1024
  modes:
    - read_only
    - dry_run
  timeout_default: 10s
