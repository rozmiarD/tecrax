operator_metadata:
  schema_version: v0.1
  profile:
    label: Tecrax
    description: Bounded monitoring, network posture and approved mutation operations.
  intents:
    assess_network_device_management_posture_readonly:
      label: Assess network device management posture
      runbook_hint: Follow docs/runbooks/network-device-readonly-runbook.md for prerequisites, connector
        checks and operator sign-off steps.
      safe_next_options:
      - rexecop runbook show assess_network_device_management_posture_readonly --profile tecrax
      - rexecop secrets doctor --env <environment.yaml>
      - rexecop operations unavailable --catalog <targets.yaml> --target <id>
      failure_mapping:
        policy:
          operator_summary: GovEngine blocked the operation or requires explicit approval before start.
          runbook_hint: Confirm policy pack, target criticality and approval evidence before retrying.
          safe_next_options:
          - rexecop policy explain --operation <operation_id>
          - rexecop operation review --operation <operation_id>
        connector:
          operator_summary: A declared connector step failed or returned an unusable result.
          safe_next_options:
          - rexecop explain-error <operation_id>
          - rexecop history --operation <operation_id>
        target:
          operator_summary: Target lock, catalog binding or target posture blocked progress.
          safe_next_options:
          - rexecop locks list
          - rexecop operation diff --operation <operation_id>
        runtime:
          operator_summary: Runtime queue, worker or recovery state needs operator triage.
          safe_next_options:
          - rexecop ops
          - rexecop runtime status --json
