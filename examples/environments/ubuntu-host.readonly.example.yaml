environment:
  id: ubuntu-host-readonly-example
  description: Sanitized operator template for bounded Ubuntu host inventory over SSH.
  profile: tecrax

  targets:
    monitoring-host-01:
      type: host
      criticality: low

  connectors:
    monitoring_host:
      enabled: true
      backend: ssh_readonly
      host: monitoring-host.example.invalid
      user: readonly-ssh-user
      known_hosts_policy: strict
      known_hosts_file: /path/outside/repo/known_hosts
      identity_file_secret_ref: monitoring_host_ssh_identity
      timeout_seconds: 10
      max_output_bytes: 8192
      allowlist:
        - action: read_os_release
          command: cat
          args: ["/etc/os-release"]
        - action: read_kernel_identity
          command: uname
          args: ["-srm"]
        - action: read_hostname
          command: hostname
          args: []
        - action: read_uptime
          command: uptime
          args: []
        - action: read_load_average
          command: cat
          args: ["/proc/loadavg"]
        - action: read_filesystem_usage
          command: df
          args: ["-P", "/"]
        - action: read_memory_summary
          command: free
          args: ["-m"]
        - action: read_ntp_sync_state
          command: timedatectl
          args: ["show", "--property=NTPSynchronized", "--property=NTP"]
        - action: read_ntp_service_state
          command: systemctl
          args: ["is-active", "ntp"]
        - action: read_docker_service_state
          command: systemctl
          args: ["show", "docker", "--property=LoadState", "--property=ActiveState", "--property=SubState", "--property=UnitFileState", "--no-pager"]
        - action: read_docker_socket_state
          command: systemctl
          args: ["show", "docker.socket", "--property=LoadState", "--property=ActiveState", "--property=SubState", "--property=UnitFileState", "--no-pager"]
        - action: read_unattended_upgrades_state
          command: systemctl
          args: ["is-enabled", "unattended-upgrades"]
        - action: read_available_updates_summary
          command: /usr/lib/update-notifier/apt-check
          args: []
        - action: read_aslr_state
          command: sysctl
          args: ["-n", "kernel.randomize_va_space"]
        - action: read_dmesg_restrict_state
          command: sysctl
          args: ["-n", "kernel.dmesg_restrict"]
        - action: read_reboot_required_marker
          command: find
          args: ["/var/run", "-maxdepth", "1", "-name", "reboot-required", "-printf", "%f\\n"]
        - action: read_ntp_server_variables
          command: ntpq
          args: ["-c", "rv 0 stratum,offset,rootdelay,rootdisp,leap"]
    zabbix_api:
      enabled: true
      backend: http_api
      base_url: http://zabbix.example.invalid
      timeout_seconds: 10
      max_response_bytes: 1024
      actions:
        read_zabbix_api_version:
          method: POST
          path: /api_jsonrpc.php
          body:
            jsonrpc: "2.0"
            method: apiinfo.version
            params: {}
            id: 1
    adguard_health:
      enabled: true
      backend: local_shell_readonly
      timeout_seconds: 10
      max_output_bytes: 2048
      allowlist:
        - action: read_adguard_dns_resolution
          command: dig
          args: ["@adguard.example.invalid", "example.com", "A", "+time=2", "+tries=1", "+noall", "+answer"]
        - action: read_adguard_login_status
          command: curl
          args: ["-sS", "-m", "3", "--connect-timeout", "2", "--max-redirs", "0", "-o", "/dev/null", "-w", "%{http_code}", "http://adguard.example.invalid/login.html"]
    portainer_api:
      enabled: true
      backend: http_api
      base_url_secret_ref: portainer_base_url
      tls:
        ca_file_secret_ref: portainer_ca_file
      timeout_seconds: 5
      max_response_bytes: 1024
      retry:
        max_attempts: 1
      actions:
        read_portainer_status:
          method: GET
          path: /api/status
          unwrap: Version

  safety:
    default_mode: dry_run
    apply_requires_govengine: true
    secrets_source: external
    max_concurrent_operations: 1
    target_lock_enabled: true

  policy_pack:
    policy_id: tecrax-ubuntu-host-readonly
    version: "2026-06-22"
    rules:
      - rule_id: allow-basic-host-inventory-operation
        effect: allow_with_obligations
        conditions:
          action.category: operation
          action.mode: read
          action.intent: collect_basic_host_inventory
        reason_code: basic_host_inventory_allowed
        obligations:
          - obligation_id: inventory-receipt
            kind: receipt
          - obligation_id: inventory-output-digests
            kind: output_digest_required
        constraints:
          - constraint_id: inventory-timeout
            kind: timeout
            value: 10
          - constraint_id: inventory-max-steps
            kind: max_steps
            value: 9
          - constraint_id: inventory-output-limit
            kind: output_limit
            value: 8192
      - rule_id: allow-ntp-health-operation
        effect: allow
        conditions:
          action.category: operation
          action.mode: read
          action.intent: check_ntp_health
        reason_code: ntp_health_allowed
      - rule_id: allow-zabbix-health-operation
        effect: allow
        conditions:
          action.category: operation
          action.mode: read
          action.intent: check_zabbix_container_health
        reason_code: zabbix_health_allowed
      - rule_id: allow-adguard-health-operation
        effect: allow
        conditions:
          action.category: operation
          action.mode: read
          action.intent: check_adguard_health
        reason_code: adguard_health_allowed
      - rule_id: allow-portainer-health-operation
        effect: allow
        conditions:
          action.category: operation
          action.mode: read
          action.intent: check_portainer_health
        reason_code: portainer_health_allowed
      - rule_id: allow-docker-services-health-operation
        effect: allow
        conditions:
          action.category: operation
          action.mode: read
          action.intent: check_docker_services_health
        reason_code: docker_services_health_allowed
      - rule_id: allow-monitoring-host-diagnosis
        effect: allow
        conditions:
          action.category: operation
          action.mode: read
          action.intent: diagnose_monitoring_host
        reason_code: monitoring_host_diagnosis_allowed
      - rule_id: allow-host-security-posture-operation
        effect: allow
        conditions: {action.category: operation, action.mode: read, action.intent: collect_host_security_posture_readonly}
        reason_code: host_security_posture_allowed
      - rule_id: allow-ntp-server-health-operation
        effect: allow
        conditions: {action.category: operation, action.mode: read, action.intent: check_ntp_server_health}
        reason_code: ntp_server_health_allowed
      - rule_id: allow-read-os-release
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: ssh_readonly, action.connector: monitoring_host, action.name: read_os_release}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-kernel-identity
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: ssh_readonly, action.connector: monitoring_host, action.name: read_kernel_identity}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-hostname
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: ssh_readonly, action.connector: monitoring_host, action.name: read_hostname}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-uptime
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: ssh_readonly, action.connector: monitoring_host, action.name: read_uptime}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-load-average
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: ssh_readonly, action.connector: monitoring_host, action.name: read_load_average}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-filesystem-usage
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: ssh_readonly, action.connector: monitoring_host, action.name: read_filesystem_usage}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-memory-summary
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: ssh_readonly, action.connector: monitoring_host, action.name: read_memory_summary}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-ntp-sync-state
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: ssh_readonly, action.connector: monitoring_host, action.name: read_ntp_sync_state}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-ntp-service-state
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: ssh_readonly, action.connector: monitoring_host, action.name: read_ntp_service_state}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-docker-service-state
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: ssh_readonly, action.connector: monitoring_host, action.name: read_docker_service_state}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-docker-socket-state
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: ssh_readonly, action.connector: monitoring_host, action.name: read_docker_socket_state}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-unattended-upgrades-state
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: ssh_readonly, action.connector: monitoring_host, action.name: read_unattended_upgrades_state}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-available-updates-summary
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: ssh_readonly, action.connector: monitoring_host, action.name: read_available_updates_summary}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-aslr-state
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: ssh_readonly, action.connector: monitoring_host, action.name: read_aslr_state}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-dmesg-restrict-state
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: ssh_readonly, action.connector: monitoring_host, action.name: read_dmesg_restrict_state}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-reboot-required-marker
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: ssh_readonly, action.connector: monitoring_host, action.name: read_reboot_required_marker}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-ntp-server-variables
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: ssh_readonly, action.connector: monitoring_host, action.name: read_ntp_server_variables}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-zabbix-api-version
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: http_api, action.connector: zabbix_api, action.name: read_zabbix_api_version}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-adguard-dns-resolution
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: local_shell_readonly, action.connector: adguard_health, action.name: read_adguard_dns_resolution}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-adguard-login-status
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: local_shell_readonly, action.connector: adguard_health, action.name: read_adguard_login_status}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-portainer-status
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: http_api, action.connector: portainer_api, action.name: read_portainer_status}
        reason_code: fixed_read_allowed
      - rule_id: deny-mutating-actions
        effect: deny
        conditions:
          action.mode: mutating
        reason_code: mutations_denied
