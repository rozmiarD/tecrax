environment:
  id: ubuntu-host-readonly-example
  description: Sanitized operator template for bounded Ubuntu host inventory over SSH.
  profile: tecrax

  targets:
    monitoring-host-01:
      type: host
      criticality: low

  connectors:
    monitoring_host:
      enabled: true
      backend: ssh_readonly
      host: monitoring-host.example.invalid
      user: readonly-ssh-user
      known_hosts_policy: strict
      known_hosts_file: /path/outside/repo/known_hosts
      identity_file_secret_ref: monitoring_host_ssh_identity
      timeout_seconds: 10
      max_output_bytes: 8192
      allowlist:
        - action: read_os_release
          command: cat
          args: ["/etc/os-release"]
        - action: read_kernel_identity
          command: uname
          args: ["-srm"]
        - action: read_hostname
          command: hostname
          args: []
        - action: read_uptime
          command: uptime
          args: []
        - action: read_load_average
          command: cat
          args: ["/proc/loadavg"]
        - action: read_filesystem_usage
          command: df
          args: ["-P", "/"]
        - action: read_memory_summary
          command: free
          args: ["-m"]
        - action: read_ntp_sync_state
          command: timedatectl
          args: ["show", "--property=NTPSynchronized", "--property=NTP"]
        - action: read_ntp_service_state
          command: systemctl
          args: ["is-active", "ntp"]
    zabbix_api:
      enabled: true
      backend: http_api
      base_url: http://zabbix.example.invalid
      timeout_seconds: 10
      max_response_bytes: 1024
      actions:
        read_zabbix_api_version:
          method: POST
          path: /api_jsonrpc.php
          body:
            jsonrpc: "2.0"
            method: apiinfo.version
            params: {}
            id: 1

  safety:
    default_mode: dry_run
    apply_requires_govengine: true
    secrets_source: external
    max_concurrent_operations: 1
    target_lock_enabled: true

  policy_pack:
    policy_id: tecrax-ubuntu-host-readonly
    version: "2026-06-22"
    rules:
      - rule_id: allow-basic-host-inventory-operation
        effect: allow
        conditions:
          action.category: operation
          action.mode: read
          action.intent: collect_basic_host_inventory
        reason_code: basic_host_inventory_allowed
      - rule_id: allow-ntp-health-operation
        effect: allow
        conditions:
          action.category: operation
          action.mode: read
          action.intent: check_ntp_health
        reason_code: ntp_health_allowed
      - rule_id: allow-zabbix-health-operation
        effect: allow
        conditions:
          action.category: operation
          action.mode: read
          action.intent: check_zabbix_container_health
        reason_code: zabbix_health_allowed
      - rule_id: allow-monitoring-host-diagnosis
        effect: allow
        conditions:
          action.category: operation
          action.mode: read
          action.intent: diagnose_monitoring_host
        reason_code: monitoring_host_diagnosis_allowed
      - rule_id: allow-read-os-release
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: ssh_readonly, action.connector: monitoring_host, action.name: read_os_release}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-kernel-identity
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: ssh_readonly, action.connector: monitoring_host, action.name: read_kernel_identity}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-hostname
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: ssh_readonly, action.connector: monitoring_host, action.name: read_hostname}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-uptime
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: ssh_readonly, action.connector: monitoring_host, action.name: read_uptime}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-load-average
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: ssh_readonly, action.connector: monitoring_host, action.name: read_load_average}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-filesystem-usage
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: ssh_readonly, action.connector: monitoring_host, action.name: read_filesystem_usage}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-memory-summary
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: ssh_readonly, action.connector: monitoring_host, action.name: read_memory_summary}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-ntp-sync-state
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: ssh_readonly, action.connector: monitoring_host, action.name: read_ntp_sync_state}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-ntp-service-state
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: ssh_readonly, action.connector: monitoring_host, action.name: read_ntp_service_state}
        reason_code: fixed_read_allowed
      - rule_id: allow-read-zabbix-api-version
        effect: allow
        conditions: {action.category: connector, action.mode: read, action.backend: http_api, action.connector: zabbix_api, action.name: read_zabbix_api_version}
        reason_code: fixed_read_allowed
      - rule_id: deny-mutating-actions
        effect: deny
        conditions:
          action.mode: mutating
        reason_code: mutations_denied
